name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Smoke-test the CLI
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          nwt init
          nwt log "Project created" --reason kickoff
          nwt log "Add activation" --files activation.py --reason retrieval --parent 1
          nwt link 1 2 --relation extends
          nwt history
          nwt graph
          nwt story
          nwt explain activation.py
